# docker-compose.dev.yml — Dev and test overlays
#
# Merged explicitly via: docker compose -f docker-compose.yml -f docker-compose.dev.yml
# Never present on production servers — bare `docker compose up` loads only the base.

# anchors are file-scoped — these need to be redeclared here
x-pg-healthcheck: &pg-healthcheck
  interval: 5s
  timeout: 5s
  retries: 5

x-kv-healthcheck: &kv-healthcheck
  interval: 5s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  app:
    build:
      context: .
      target: dev_target
      dockerfile: docker/app/Dockerfile
      args:
        GO_VERSION: ${GO_VERSION}
        AIR_VERSION: ${AIR_VERSION}
        SQLC_VERSION: ${SQLC_VERSION}
        PGSCHEMA_VERSION: ${PGSCHEMA_VERSION}
        TAILWIND_VERSION: ${TAILWIND_VERSION}
        HUGO_VERSION: ${HUGO_VERSION}
        GOLANGCI_LINT_VERSION: ${GOLANGCI_LINT_VERSION}
    image: forge-dev
    read_only: false
    tmpfs: !reset []
    security_opt: !reset []
    cap_drop: !reset []
    pids_limit: 512
    healthcheck:
      disable: true
    volumes:
      - .:/app
    restart: "no"

  schema_data:
    profiles: [db]
    build:
      context: ./docker/postgres
      args:
        PG_VERSION: ${PG_VERSION}
    image: forge-db:latest
    environment:
      POSTGRES_USER: ${PGSCHEMA_PLAN_USER}
      POSTGRES_PASSWORD: ${PGSCHEMA_PLAN_PASSWORD}
      POSTGRES_DB: ${PGSCHEMA_PLAN_DB}
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./db/init-plan:/var/lib/postgres/initdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGSCHEMA_PLAN_USER}"]
      <<: *pg-healthcheck
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  test_db:
    profiles: [test]
    build:
      context: ./docker/postgres
      args:
        PG_VERSION: ${PG_VERSION}
    image: forge-db:latest
    environment:
      POSTGRES_USER: ${PGTEST_USER}
      POSTGRES_PASSWORD: ${PGTEST_PASSWORD}
      POSTGRES_DB: ${PGTEST_DATABASE}
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./db/init-test:/var/lib/postgres/initdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGTEST_USER}"]
      <<: *pg-healthcheck
    networks:
      - test_network

  test_kv:
    profiles: [test]
    build:
      context: ./docker/dragonfly
      args:
        DRAGONFLY_VERSION: ${DRAGONFLY_VERSION}
        GO_VERSION: ${GO_VERSION}
    image: forge-kv:latest
    environment:
      - DFLY_requirepass=${KVTEST_PASSWORD:-}
    tmpfs:
      - /data
    mem_swappiness: 0
    ulimits:
      memlock: -1
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      <<: *kv-healthcheck
    networks:
      - test_network

networks:
  test_network:
    driver: bridge
