# docker-compose.dev.yml — Dev overlay
#
# Merged explicitly via: docker compose -f docker-compose.yml -f docker-compose.dev.yml
# Never present on production servers — bare `docker compose up` loads only the base.
#
# The db container hosts three databases (created by db/init-dev/01-databases.sh):
#   starter       — main development database
#   starter_plan  — pgschema diff computation (make db-diff)
#   starter_test  — test suite (make test)
# The kv container is shared: DB 0 for dev, DB 1 for tests.

services:
  db:
    volumes:
      - ./db/init-dev:/var/lib/postgres/initdb

  app:
    build:
      context: .
      target: dev_target
      dockerfile: docker/app/Dockerfile
      args:
        TOOLS_DEV_IMAGE: ${TOOLS_DEV}
    image: forge-dev
    pids_limit: 512
    ports:
      - "${APP_PORT:-8080}:8080"
    read_only: false
    mem_limit: 2g
    memswap_limit: 2g
    tmpfs: !reset []
    security_opt: !reset []
    cap_drop: !reset []
    healthcheck:
      disable: true
    volumes:
      - .:/app
    restart: "no"
