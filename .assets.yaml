paths:
  source_dir: static       # raw asset sources committed in the repo
  public_dir: public       # built output served by Echo and copied into the image
  public_prefix: /public   # URL prefix the app serves from

js:
  downloads:
    - name: htmx
      version: "2.0.4"       # HTMX_VERSION env var overrides at build time
      url: "https://unpkg.com/htmx.org@{version}/dist/htmx.min.js"
      target: js/htmx.min.js
  bundles:
    - entry: js/app.js
      target: js/app.js

css:
  - tool: tailwindcss
    input: css/tailwind.css
    output: css/app.css

# Self-hosted font files to download into public/fonts/.
# Once downloaded, files are automatically content-hashed by the assets manifest.
# Use assets.Path("fonts/<name>") in font.Face.URL to get the versioned URL.
# Delete the target file to force a re-download on the next asset build.
fonts:
  downloads: []
  # Example: uncomment and adjust to self-host Inter from the jsDelivr CDN.
  # downloads:
  #   - name: inter-regular
  #     url: "https://cdn.jsdelivr.net/npm/@fontsource/inter@5/files/inter-latin-400-normal.woff2"
  #     target: fonts/inter-latin-400-normal.woff2
  #   - name: inter-semibold
  #     url: "https://cdn.jsdelivr.net/npm/@fontsource/inter@5/files/inter-latin-600-normal.woff2"
  #     target: fonts/inter-latin-600-normal.woff2

sprites:
  lucide-icons:
    enabled: true
    target: img/svg/lucide-icons.svg
    sources:
      - path: "https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/"
        files:
          - "chevron-down.svg"
          - "chevron-left.svg"
          - "chevron-right.svg"
          - "chevron-up.svg"
          - "chevrons-left.svg"
          - "chevrons-up.svg"
          - "circle-user.svg"
          - "file-text.svg"
          - "info.svg"
          - "menu.svg"
          - "refresh-cw.svg"
          - "trash-2.svg"
          - "triangle-alert.svg"
          - "x.svg"

  theme-icons:
    enabled: true
    target: img/svg/theme-icons.svg
    sources:
      - path: "img/svg/"
        files:
          - "sun.svg"
          - "moon.svg"
          - "monitor.svg"
