baseURL = "/docs/"
title = "Forge Documentation"
disableKinds = ["taxonomy", "term", "RSS", "sitemap", "robotsTXT"]

[params]
  description = "Architecture guides and package documentation for Forge."

[markup]
  [markup.goldmark.renderer]
    unsafe = false
  [markup.highlight]
    codeFences = true
    noClasses = false

[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "../.decisions"
    target = "content/architecture"
    includeFiles = ["DESIGN_GUIDE.md", "UI_GUIDE.md"]
  [[module.mounts]]
    source = "../pkg/componentry/README.md"
    target = "content/packages/componentry.md"
  [[module.mounts]]
    source = "../pkg/security/README.md"
    target = "content/packages/security.md"
  [[module.mounts]]
    source = "../pkg/send/README.md"
    target = "content/packages/send.md"
  [[module.mounts]]
    source = "../pkg/server/README.md"
    target = "content/packages/server.md"
  [[module.mounts]]
    source = "../pkg/site/README.md"
    target = "content/packages/site.md"
