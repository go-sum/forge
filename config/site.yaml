site:
  title: starter
  description: ""
  logo_path: ""
  favicon_path: ""
  meta_keywords: []
  og_image: ""
  copyright_year: 2025
  robots:
    default_allow: true
    disallow_paths: []       # empty = use pkg/site DefaultDisallowPaths
  sitemap:
    default_changefreq: weekly
    default_priority: 0.5
    routes:
      - name: home.show
        changefreq: daily
        priority: 1.0
    static_pages: []
  fonts:              # Font providers — populate to activate.
    google:
      families: []    # Google Fonts: families use the v2 format "Family:wght@400;700".
    bunny:
      families: []    # Bunny Fonts: GDPR-friendly Google Fonts alternative; format "family:400,700".
    adobe:
      project_id: ""  # Adobe Fonts: set project_id to your Typekit kit ID.
    # Self-hosted font files should be downloaded via .assets.yaml fonts.downloads first.
    # Use assets.Path("fonts/<file>") patterns resolved at layout render time.
    self_hosted: []   # Self-hosted fonts: list families and their face files.
