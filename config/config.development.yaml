app:
  env: development

log:
  level: debug

server:
  port: 3000

security:
  external_origin: http://localhost:8080
  headers:
    # Inline script hashes are injected at startup — see csp_hashes below.
    content_security_policy: "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'"
    hsts:
      enabled: false

csp_hashes:
  dev_only:
    - "'sha256-y933zYNvpVe5f9j5A+OKECUXiWo8bKB5Yp5sLDD3d0I='"  # air proxy hot-reload; run `make air-csp-hash` to update

auth:
  session:
    secure: false
