# manifest.yaml — Starter clone manifest
#
# Defines what the `tools/cli/starter clone` command copies, renames, and
# rewrites when materialising a new app from forge.
#
# All paths are relative to the forge repository root.

# Paths (files and directories) to exclude from the clone.
# Everything else is copied verbatim.
exclude:
  # Monorepo-only zones — not in .gitignore, must be explicitly excluded.
  - .decisions/MONOREPO_PACKAGES.md
  - .project/
  - go.mod
  - go.sum
  - go.work
  - go.work.sum
  - pkg/
  - tools/

# Files to rename in the destination after copying.
rename:
  - from: go.prod.mod
    to:   go.mod
  - from: go.prod.sum
    to:   go.sum

# Root module path substitution.
# `from` is rewritten to the --module flag value supplied at clone time
# in go.mod (module directive) and across all Go import paths.
moduleRewrite:
  from: github.com/go-sum/forge
