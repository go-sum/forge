x-pg-image: &pg-image postgres:16-alpine
x-kv-image: &kv-image docker.dragonflydb.io/dragonflydb/dragonfly:latest

x-pg-healthcheck: &pg-healthcheck
  interval: 5s
  timeout: 5s
  retries: 5

x-kv-healthcheck: &kv-healthcheck
  interval: 5s
  timeout: 5s
  retries: 5

services:
  app:
    image: forge:latest
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      kv:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  db:
    image: *pg-image
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER}"]
      <<: *pg-healthcheck
    restart: unless-stopped
    networks:
      - app_network

  kv:
    image: *kv-image
    environment:
      - DFLY_requirepass=${KV_PASSWORD:-}
    volumes:
      - kv_data:/data
    mem_swappiness: 0
    ulimits:
      memlock: -1
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      <<: *kv-healthcheck
    restart: unless-stopped
    networks:
      - app_network

volumes:
  postgres_data:
  kv_data:

networks:
  app_network:
    driver: bridge
