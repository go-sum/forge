x-pg-healthcheck: &pg-healthcheck
  interval: 5s
  timeout: 5s
  retries: 5

x-kv-healthcheck: &kv-healthcheck
  interval: 5s
  timeout: 5s
  retries: 5
  start_period: 20s

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    image: forge:latest
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      kv:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/opt/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app_network

  db:
    build:
      context: ./docker/postgres
      args:
        PG_VERSION: ${PG_VERSION}
    image: forge-db:latest
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    shm_size: 128m
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/var/lib/postgres/initdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER}"]
      <<: *pg-healthcheck
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app_network

  kv:
    build:
      context: ./docker/dragonfly
      args:
        DRAGONFLY_VERSION: ${DRAGONFLY_VERSION}
        GO_VERSION: ${GO_VERSION}
    image: forge-kv:latest
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    environment:
      - DFLY_requirepass=${KV_PASSWORD:-}
    volumes:
      - kv_data:/data
    mem_swappiness: 0
    ulimits:
      memlock: -1
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      <<: *kv-healthcheck
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app_network

volumes:
  postgres_data:
  kv_data:

networks:
  app_network:
    driver: bridge
