x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: caddy:2
    container_name: forge-caddy
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 128m
    memswap_limit: 128m
    pids_limit: 64
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DEV_DOMAIN
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../.certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:443"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: "no"
    logging: *default-logging
    networks:
      - app_network

volumes:
  caddy_data:
  caddy_config:

networks:
  app_network:
    external: true
    name: forge_app_network
