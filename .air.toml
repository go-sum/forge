root = "."
tmp_dir = "tmp"

[build]
  # Run the full asset pipeline before each server rebuild.
  # CSS, JS always rebuild; remote downloads are skipped
  # when their targets already exist.
  pre_cmd = ["go run ./cli/build assets"]
  cmd = "go build -ldflags=\"-X main.version=${APP_VERSION}\" -o ./tmp/server ./cmd/server"
  entrypoint = ["./tmp/server"]
  include_ext = ["go", "toml", "css", "js", "yaml", "html"]
  exclude_dir = ["bin", "cli", "db", "docker", "pkg", "public", "scripts", "tmp", "tools"]

[proxy]
  enabled = true
  proxy_port = 8080
  app_port = 3000

[log]
  time = true
