name: Build and Push Production Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: git short SHA)"
        required: false
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read .versions
        id: versions
        run: |
          while IFS='=' read -r key value; do
            [[ -z "$key" || "$key" =~ ^# ]] && continue
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done < .versions

      - name: Compute image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build production tools image
        run: |
          docker build \
            --target production_tools \
            --file docker/tools/Dockerfile \
            --build-arg GO_VERSION=${{ steps.versions.outputs.GO_VERSION }} \
            --build-arg HUGO_VERSION=${{ steps.versions.outputs.HUGO_VERSION }} \
            --build-arg TAILWIND_VERSION=${{ steps.versions.outputs.TAILWIND_VERSION }} \
            -t forge-tools:prod \
            docker/tools

      - name: Build and push
        run: |
          GITHUB_TOKEN="${{ secrets.PACKAGES_TOKEN }}" \
          docker build \
            --target production_target \
            --file docker/app/Dockerfile \
            --build-arg GO_VERSION=${{ steps.versions.outputs.GO_VERSION }} \
            --build-arg HTMX_VERSION=${{ steps.versions.outputs.HTMX_VERSION }} \
            --build-arg TOOLS_PROD_IMAGE=forge-tools:prod \
            --secret id=github_token,env=GITHUB_TOKEN \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push images
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Clean up old images
        uses: actions/delete-package-versions@v5
        with:
          package-name: forge
          package-type: container
          min-versions-to-keep: 5
