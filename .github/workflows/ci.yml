name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: forge
            workdir: .
            command: go test ./...
          - name: auth
            workdir: pkg/auth
            command: GOWORK=off go test ./...
          - name: componentry
            workdir: pkg/componentry
            command: GOWORK=off go test ./...
          - name: server
            workdir: pkg/server
            command: GOWORK=off go test ./...
          - name: security
            workdir: pkg/security
            command: GOWORK=off go test ./...
          - name: site
            workdir: pkg/site
            command: GOWORK=off go test ./...
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Run ${{ matrix.name }} tests
        working-directory: ${{ matrix.workdir }}
        run: ${{ matrix.command }}
