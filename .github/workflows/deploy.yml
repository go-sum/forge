name: Deploy

# Runs automatically after CI passes on main.
# Can also be triggered manually via the GitHub Actions UI.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   DATABASE_URL       Production database DSN
#   REGISTRY           Image registry prefix, e.g. ghcr.io/my-org
#   REGISTRY_USERNAME  Registry login username
#   REGISTRY_PASSWORD  Registry login password or token
#
# Optional repository variables (Settings → Secrets and variables → Variables):
#   IMAGE_NAME   Image base name (default: starter)

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # For workflow_run triggers, only proceed if CI succeeded.
    # workflow_dispatch always proceeds.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build, push image, and apply schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REGISTRY: ${{ secrets.REGISTRY }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME || 'starter' }}
          # IMAGE_TAG defaults to the short git SHA inside deploy.sh
        run: ./scripts/deploy.sh

      # ── Restart step ──────────────────────────────────────────────────────
      # Replace this step with your platform-specific restart command.
      # The IMAGE_TAG printed by deploy.sh is the short git SHA of this commit.
      #
      # Self-hosted SSH example:
      #   - name: Restart service
      #     run: ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
      #            "cd /app && docker compose pull && docker compose up -d"
      #
      # Docker Swarm example:
      #   - name: Restart service
      #     run: docker service update
      #            --image ${{ secrets.REGISTRY }}/starter:${GITHUB_SHA::7}
      #            my_service
      #
      # Fly.io example:
      #   - name: Restart service
      #     uses: superfly/flyctl-actions/setup-flyctl@master
      #   - run: flyctl deploy --image ${{ secrets.REGISTRY }}/starter:${GITHUB_SHA::7}
      #     env:
      #       FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # ──────────────────────────────────────────────────────────────────────
      - name: Restart service (add your platform step here)
        run: |
          echo "Image built and schema applied."
          echo "Add your platform restart command in this step."
          echo "See the comments above for examples."
