name: Deploy

# Runs automatically after CI passes on main.
# Can also be triggered manually via the GitHub Actions UI.
#
# Required secrets (Settings > Secrets and variables > Actions):
#   DEPLOY_HOST       Server hostname or IP
#   DEPLOY_USER       SSH username on the server
#   DEPLOY_SSH_KEY    Private SSH key for authentication
#
# Optional secrets:
#   DEPLOY_PATH       Path to deploy directory (default: /opt/forge)
#
# Optional repository variables (Settings > Secrets and variables > Variables):
#   DEPLOY_BRANCH     Branch to deploy (default: main)

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: false
        default: "main"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # For workflow_run triggers, only proceed if CI succeeded.
    # workflow_dispatch always proceeds.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 30m
          script: |
            export DEPLOY_DIR="${{ secrets.DEPLOY_PATH || '/opt/forge' }}"
            export DEPLOY_REPO="${{ github.server_url }}/${{ github.repository }}.git"

            # Ensure deploy.sh is available (first deploy may not have it locally)
            if [[ -f "${DEPLOY_DIR}/deploy.sh" ]]; then
              "${DEPLOY_DIR}/deploy.sh" "${{ inputs.branch || vars.DEPLOY_BRANCH || 'main' }}"
            else
              # Bootstrap: clone to get the script, then run it
              TEMP="$(mktemp -d)"
              git clone --depth 1 --branch "${{ inputs.branch || vars.DEPLOY_BRANCH || 'main' }}" "${DEPLOY_REPO}" "${TEMP}/src"
              mkdir -p "${DEPLOY_DIR}"
              cp "${TEMP}/src/scripts/deploy.sh" "${DEPLOY_DIR}/deploy.sh"
              chmod +x "${DEPLOY_DIR}/deploy.sh"
              rm -rf "${TEMP}"
              "${DEPLOY_DIR}/deploy.sh" "${{ inputs.branch || vars.DEPLOY_BRANCH || 'main' }}"
            fi
