name: Packages Sync

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      package:
        description: Optional single package to sync
        required: false
        type: choice
        options:
          - all
          - auth
          - componentry
          - security
          - server
          - site
        default: all

permissions:
  contents: read

concurrency:
  group: packages-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - auth
          - componentry
          - security
          - server
          - site
    steps:
      - name: Skip if not target package
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.package != 'all' &&
          github.event.inputs.package != matrix.package
        run: exit 0

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "forge-sync-bot"
          git config user.email "actions@github.com"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work


      - name: Sync ${{ matrix.package }}
        env:
          PACKAGE_SYNC_TOKEN: ${{ secrets.PACKAGE_SYNC_TOKEN }}
          PACKAGE_REPO_OWNER: go-sum
        run: ./scripts/package-sync.sh "${{ matrix.package }}"
